name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/ app/

      - name: Test (unit + API smoke)
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Pipeline smoke (LendingClub features + FRED merge, no download)
        run: make smoke-lc

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase owner (GHCR requires it)
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build (no push) on PRs
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: credit-risk-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/credit-risk-api:latest
            ghcr.io/${{ steps.ghcr.outputs.owner }}/credit-risk-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hf-space:
    name: Sync to HuggingFace Space
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub[hf_xet]>=0.27"

      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}   # e.g. credit-risk-api
        if: env.HF_TOKEN != '' && env.HF_USER != '' && env.HF_SPACE != ''
        run: |
          # The Space's root README needs the YAML frontmatter (sdk, app_port,
          # …) that lives in hf_space/README.md. Swap them in the runner's
          # working tree before upload so the Space recognises the config.
          cp hf_space/README.md README.md

          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USER']}/{os.environ['HF_SPACE']}"
          sha = os.environ.get("GITHUB_SHA", "manual")[:12]

          # Binaries (model joblib, parquet, png) go through Xet automatically
          # via the hf_xet extra. Web frontend, notebooks, and other non-runtime
          # files are excluded to keep the Space lean.
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"sync: {sha} from credit-risk-portfolio",
              ignore_patterns=[
                  ".git/**",
                  ".github/**",
                  ".vscode/**",
                  "web/**",
                  "notebooks/**",
                  "mlruns/**",
                  "logs/**",
                  "tasks/**",
                  "docs/**",
                  "tests/**",
                  "hf_space/**",
                  "**/__pycache__/**",
                  "**/.pytest_cache/**",
                  "**/.ruff_cache/**",
                  "**/.ipynb_checkpoints/**",
                  "data/raw/**",
              ],
              delete_patterns=["**"],  # remove files in Space not present locally
          )
          PY
