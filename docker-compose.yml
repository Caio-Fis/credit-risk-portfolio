services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-risk-api:dev
    container_name: credit-risk-api
    ports:
      - "7860:7860"
    environment:
      CREDIT_RISK_ENVIRONMENT: development
      CREDIT_RISK_LOG_LEVEL: INFO
      PORT: "7860"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
