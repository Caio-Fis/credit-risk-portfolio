# Feature contract — all pipeline features documented here
# Fields: name, description, window_days (null if not temporal), source, dtype

features:

  # ---------------------------------------------------------------------------
  # Identity / registration features
  # ---------------------------------------------------------------------------
  - name: sk_id_curr
    description: Unique contract/client identifier
    window_days: null
    source: home_credit/application_train.csv
    dtype: int64

  - name: target
    description: "1 = default (payment overdue >90d), 0 = no default"
    window_days: null
    source: home_credit/application_train.csv
    dtype: int8

  - name: amt_credit
    description: Total credit amount granted (EAD proxy)
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  - name: amt_income_total
    description: Annual income declared by the applicant
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  - name: amt_annuity
    description: Loan annuity amount
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  - name: days_birth
    description: Age in days (negative — days from birth to reference date)
    window_days: null
    source: home_credit/application_train.csv
    dtype: int32

  - name: days_employed
    description: Employment duration in days (negative; 365243 = unemployed)
    window_days: null
    source: home_credit/application_train.csv
    dtype: int32

  - name: ext_source_1
    description: External bureau score 1 (normalized 0–1)
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  - name: ext_source_2
    description: External bureau score 2 (normalized 0–1)
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  - name: ext_source_3
    description: External bureau score 3 (normalized 0–1)
    window_days: null
    source: home_credit/application_train.csv
    dtype: float64

  # ---------------------------------------------------------------------------
  # Derived features — time windows (bureau_balance)
  # ---------------------------------------------------------------------------
  - name: bureau_cnt_credits_30d
    description: Number of active credits in the last 30 days (bureau)
    window_days: 30
    source: home_credit/bureau.csv + bureau_balance.csv
    dtype: int32

  - name: bureau_cnt_credits_90d
    description: Number of active credits in the last 90 days (bureau)
    window_days: 90
    source: home_credit/bureau.csv + bureau_balance.csv
    dtype: int32

  - name: bureau_cnt_credits_365d
    description: Number of active credits in the last 365 days (bureau)
    window_days: 365
    source: home_credit/bureau.csv + bureau_balance.csv
    dtype: int32

  - name: bureau_cnt_overdue_30d
    description: Number of overdue credits in the last 30 days
    window_days: 30
    source: home_credit/bureau_balance.csv
    dtype: int32

  - name: bureau_cnt_overdue_90d
    description: Number of overdue credits in the last 90 days
    window_days: 90
    source: home_credit/bureau_balance.csv
    dtype: int32

  - name: bureau_cnt_overdue_365d
    description: Number of overdue credits in the last 365 days
    window_days: 365
    source: home_credit/bureau_balance.csv
    dtype: int32

  - name: prev_cnt_applications_30d
    description: Number of previous credit applications in the last 30 days
    window_days: 30
    source: home_credit/previous_application.csv
    dtype: int32

  - name: prev_cnt_applications_90d
    description: Number of previous credit applications in the last 90 days
    window_days: 90
    source: home_credit/previous_application.csv
    dtype: int32

  - name: prev_cnt_refused_90d
    description: Number of refused applications in the last 90 days
    window_days: 90
    source: home_credit/previous_application.csv
    dtype: int32

  - name: installments_dpd_mean_30d
    description: Mean days past due on installments in the last 30 days
    window_days: 30
    source: home_credit/installments_payments.csv
    dtype: float64

  - name: installments_dpd_mean_90d
    description: Mean days past due on installments in the last 90 days
    window_days: 90
    source: home_credit/installments_payments.csv
    dtype: float64

  - name: installments_dpd_max_90d
    description: Maximum days past due on installments in the last 90 days
    window_days: 90
    source: home_credit/installments_payments.csv
    dtype: float64

  # ---------------------------------------------------------------------------
  # Macroeconomic features (BCB SGS)
  # ---------------------------------------------------------------------------
  - name: selic_rate
    description: Annualized Selic rate (%) at the reference date — BCB series 432
    window_days: null
    source: bcb_sgs/serie_432
    dtype: float64

  - name: pj_default_rate
    description: Corporate default rate (%) — BCB series 21082
    window_days: null
    source: bcb_sgs/serie_21082
    dtype: float64

  - name: ibc_br_yoy
    description: IBC-Br year-over-year change (economic activity proxy) — BCB series 24364
    window_days: null
    source: bcb_sgs/serie_24364
    dtype: float64

  # ---------------------------------------------------------------------------
  # LGD features (Module 1)
  # ---------------------------------------------------------------------------
  - name: lgd
    description: "Observed Loss Given Default: (1 - recovery rate). Target variable for the LGD model."
    window_days: null
    source: derived/recovery_rate
    dtype: float64

  # ---------------------------------------------------------------------------
  # Contextual features (Module 3 — synthetic dataset)
  # ---------------------------------------------------------------------------
  - name: product_type
    description: "Product type: working_capital | investment | receivables_advance"
    window_days: null
    source: synthetic/contextual
    dtype: category

  - name: tenor_months
    description: "Contract term in months: 1, 3, 6, 12, 24, 36, 48"
    window_days: null
    source: synthetic/contextual
    dtype: int8

  - name: has_collateral
    description: "1 = contract with collateral, 0 = unsecured"
    window_days: null
    source: synthetic/contextual
    dtype: int8

  - name: pd_single_score
    description: Single PD score (output of baseline model, used as feature in contextual model)
    window_days: null
    source: derived/pd_model
    dtype: float64
